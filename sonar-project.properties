# Copy-paste-detection exclusions.
#
# 1) Publisher CLI wrappers share an identical argparse + env-validation +
#    error-exit pattern by design — each platform publisher in
#    scripts/social-analytics/publishers/ follows the same shape. safeForLog +
#    buildHeaders are already shared via require() from linkedin-comment.js;
#    the CLI entrypoint block is intentionally parallel and should not
#    trigger new_duplicated_lines_density failures on future publishers.
#
# 2) scripts/seo-gsd.js is the SEO guide registry. Each PAGE_BLUEPRINTS and
#    BROWSER_BRIDGE_GUIDE_SPECS entry is a data record (query, path, hero,
#    takeaways, sections, faq, relatedPaths) whose shape is deliberately
#    parallel across guides — that parallelism is the schema. Further
#    abstraction would hurt author ergonomics without improving reliability
#    or security. Treat this file as data, not logic, for CPD purposes.
#
# 3) Revenue-pack, demand-pack, and revenue-machine generators are
#    intentionally parallel operator artifacts. Their repeated fields are the
#    commercial schema (surface, buyer signal, proof trigger, CTA, guardrails),
#    while shared rendering and tracking helpers live in utility scripts. Keep
#    bugs, coverage, and security scanning active, but exclude these
#    template-shaped sales records from copy-paste detection.
#
# 4) High-ROI operator generators and guardrail packs are generated/registry-
#    shaped scripts. Their repeated JSON-ish records, launcher scaffolds, and
#    prompt/checklist strings are the product workflow definitions, not copied
#    imperative code. Keep those files in normal Sonar analysis; exclude only
#    CPD so generated records do not block security-positive releases.
sonar.cpd.exclusions=scripts/social-analytics/publishers/linkedin-*.js,scripts/seo-gsd.js,scripts/*revenue-pack.js,scripts/*demand-pack.js,scripts/*workflow-hardening-pack.js,scripts/may-2026-revenue-machine.js,scripts/*guardrails.js,scripts/agent-design-governance.js,scripts/bluesky-monitor-launchd.js,scripts/reddit-monitor-launchd.js,scripts/medium-weekly.js,scripts/prove-seo-gsd.js,scripts/tool-registry.js,scripts/cli-schema.js,scripts/upstream-contribution-engine.js
