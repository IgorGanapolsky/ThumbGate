name: Publish Pro to NPM

on:
  push:
    branches: [main]
    paths:
      - 'pro/**'
      - 'package.json'
      - '.github/workflows/publish-npm-pro.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-npm-pro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-pro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version parity
        run: |
          FREE_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          PRO_VERSION=$(node -e "process.stdout.write(require('./pro/package.json').version)")
          echo "Free: $FREE_VERSION  Pro: $PRO_VERSION"
          if [ "$FREE_VERSION" != "$PRO_VERSION" ]; then
            echo "::error::Version mismatch! Free=$FREE_VERSION Pro=$PRO_VERSION"
            exit 1
          fi

      - name: Check if Pro version already published
        id: check
        working-directory: pro
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "mcp-memory-gateway-pro@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Pro package
        if: steps.check.outputs.published == 'false'
        working-directory: pro
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report skip
        if: steps.check.outputs.published == 'true'
        run: echo "mcp-memory-gateway-pro@${{ steps.check.outputs.version }} already published — skipping"
