name: Merge Branch to Main

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to merge into main (PR-based, policy compliant)'
        required: true
      auto_merge:
        description: 'Enable auto-merge after PR creation'
        required: false
        default: 'true'

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  THUMBGATE_MAIN_MERGE_PROVIDER: trunk

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate branch exists
        id: branch
        run: |
          if git ls-remote --heads origin "${{ github.event.inputs.branch }}" | grep -q "${{ github.event.inputs.branch }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Branch not found: ${{ github.event.inputs.branch }}"
            exit 1
          fi

      - name: Create or find PR
        if: steps.branch.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail

          EXISTING_PR=$(gh pr list \
            --base main \
            --head "${{ github.event.inputs.branch }}" \
            --state open \
            --json url \
            --jq '.[0].url')

          if [ -n "${EXISTING_PR:-}" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "Using existing PR: $EXISTING_PR"
            PR_URL="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head "${{ github.event.inputs.branch }}" \
              --title "chore: merge ${{ github.event.inputs.branch }}" \
              --body "Automated PR creation via merge-branch workflow.")
            echo "Created PR: $PR_URL"
          fi

          if [ "${{ github.event.inputs.auto_merge }}" = "true" ]; then
            PR_NUMBER="$(gh pr view "$PR_URL" --json number --jq '.number')"

            if [ "${THUMBGATE_MAIN_MERGE_PROVIDER}" = "trunk" ]; then
              existing_comment_id="$(
                gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                  --jq '.[] | select(.user.login == "github-actions[bot]" and .body == "/trunk merge") | .id' \
                  | head -n 1
              )"

              if [ -n "${existing_comment_id:-}" ]; then
                echo "Trunk merge request already exists for $PR_URL"
              else
                gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                  --method POST \
                  -f body='/trunk merge' >/dev/null
                echo "Requested Trunk merge for $PR_URL"
              fi
            else
              node scripts/pr-manager.js "$PR_NUMBER"
            fi
          fi
