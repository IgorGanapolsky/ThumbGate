name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-railway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      THUMBGATE_API_KEY: ${{ secrets.THUMBGATE_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
      RAILWAY_HEALTHCHECK_URL: ${{ vars.RAILWAY_HEALTHCHECK_URL || 'https://thumbgate-production.up.railway.app/health' }}
      RAILWAY_HEALTHCHECK_MAX_ATTEMPTS: ${{ vars.RAILWAY_HEALTHCHECK_MAX_ATTEMPTS || '120' }}
      RAILWAY_HEALTHCHECK_SLEEP_SECONDS: ${{ vars.RAILWAY_HEALTHCHECK_SLEEP_SECONDS || '10' }}
      RAILWAY_HEALTHCHECK_CONNECT_TIMEOUT_SECONDS: ${{ vars.RAILWAY_HEALTHCHECK_CONNECT_TIMEOUT_SECONDS || '5' }}
      RAILWAY_HEALTHCHECK_MAX_TIME_SECONDS: ${{ vars.RAILWAY_HEALTHCHECK_MAX_TIME_SECONDS || '20' }}
      RAILWAY_LOG_LINES: ${{ vars.RAILWAY_LOG_LINES || '200' }}
      RAILWAY_HTTP_LOG_LINES: ${{ vars.RAILWAY_HTTP_LOG_LINES || '50' }}
      THUMBGATE_PUBLIC_APP_ORIGIN: ${{ vars.THUMBGATE_PUBLIC_APP_ORIGIN || 'https://thumbgate-production.up.railway.app' }}
      THUMBGATE_BILLING_API_BASE_URL: ${{ vars.THUMBGATE_BILLING_API_BASE_URL || vars.THUMBGATE_PUBLIC_APP_ORIGIN || 'https://thumbgate-production.up.railway.app' }}
      THUMBGATE_FEEDBACK_DIR: ${{ vars.THUMBGATE_FEEDBACK_DIR }}
      THUMBGATE_GA_MEASUREMENT_ID: ${{ vars.THUMBGATE_GA_MEASUREMENT_ID }}
      THUMBGATE_GOOGLE_SITE_VERIFICATION: ${{ vars.THUMBGATE_GOOGLE_SITE_VERIFICATION }}
      RAILWAY_TOKEN_ROTATED_AT: ${{ vars.RAILWAY_TOKEN_ROTATED_AT }}
      THUMBGATE_API_KEY_ROTATED_AT: ${{ vars.THUMBGATE_API_KEY_ROTATED_AT }}
      STRIPE_SECRET_KEY_ROTATED_AT: ${{ vars.STRIPE_SECRET_KEY_ROTATED_AT }}
      STRIPE_WEBHOOK_SECRET_ROTATED_AT: ${{ vars.STRIPE_WEBHOOK_SECRET_ROTATED_AT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect deployable changes
        id: deploy-scope
        run: |
          BEFORE_SHA='${{ github.event.before }}'
          CHANGED_FILES=''
          SHOULD_DEPLOY=true
          DEPLOYABLE_PATTERN='^(src/|scripts/.*\.(js|mjs|cjs)$|config/|adapters/|public/|\.well-known/|openapi/|workers/|Dockerfile$|railway\.json$|package\.json$|package-lock\.json$)'

          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | sed '/^$/d')"
            if [ -n "$CHANGED_FILES" ] && ! printf '%s\n' "$CHANGED_FILES" | grep -Eq "$DEPLOYABLE_PATTERN"; then
              SHOULD_DEPLOY=false
            fi
          fi

          echo "before_sha=${BEFORE_SHA:-<none>}"
          echo 'changed_files:'
          printf '%s\n' "${CHANGED_FILES:-<none>}"
          echo "deployable_pattern=$DEPLOYABLE_PATTERN"
          echo "should_deploy=$SHOULD_DEPLOY"

          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Check Railway deployment configuration
        id: railway-config
        run: |
          if [ "${{ steps.deploy-scope.outputs.should_deploy }}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Railway deploy skipped: no runtime-serving files changed on this commit."
            exit 0
          fi

          missing_config=()
          [ -z "$RAILWAY_TOKEN" ] && missing_config+=('RAILWAY_TOKEN')
          [ -z "$RAILWAY_PROJECT_ID" ] && missing_config+=('RAILWAY_PROJECT_ID')
          [ -z "$RAILWAY_ENVIRONMENT_ID" ] && missing_config+=('RAILWAY_ENVIRONMENT_ID')
          [ -z "$RAILWAY_HEALTHCHECK_URL" ] && missing_config+=('RAILWAY_HEALTHCHECK_URL')

          if [ "${#missing_config[@]}" -gt 0 ]; then
            echo "::error::Railway deploy blocked: missing required deploy config: ${missing_config[*]}"
            exit 1
          fi

          missing_runtime_secrets=()
          [ -z "$THUMBGATE_API_KEY" ] && missing_runtime_secrets+=('THUMBGATE_API_KEY')

          if [ "${#missing_runtime_secrets[@]}" -gt 0 ]; then
            echo "::error::Railway deploy blocked: missing required runtime secrets: ${missing_runtime_secrets[*]}"
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - name: Enforce deploy policy
        if: steps.railway-config.outputs.enabled == 'true'
        run: node scripts/deploy-policy.js --profiles=billing,deploy
      - name: Stamp immutable build metadata
        if: steps.railway-config.outputs.enabled == 'true'
        run: node scripts/build-metadata.js --sha "$GITHUB_SHA" --output config/build-metadata.json
      - name: Install Railway CLI
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          npm install -g @railway/cli
          railway version || true
      - name: Set Railway environment variables
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          retry_railway() {
            local description="$1"
            shift
            local attempt=1
            local max_attempts=4
            local sleep_seconds=10

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Railway command failed after $attempt attempts: $description"
                return 1
              fi

              echo "Railway command failed (attempt $attempt/$max_attempts): $description"
              echo "Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          SERVICE_ARGS=()
          if [ -n "$RAILWAY_SERVICE" ]; then
            SERVICE_ARGS+=(--service "$RAILWAY_SERVICE")
          fi
          retry_railway "set THUMBGATE_API_KEY" railway variables set THUMBGATE_API_KEY="$THUMBGATE_API_KEY" "${SERVICE_ARGS[@]}"
          retry_railway "set THUMBGATE_BUILD_SHA" railway variables set THUMBGATE_BUILD_SHA="$GITHUB_SHA" "${SERVICE_ARGS[@]}"
          retry_railway "set THUMBGATE_BUILD_GENERATED_AT" railway variables set THUMBGATE_BUILD_GENERATED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "${SERVICE_ARGS[@]}"
          retry_railway "set THUMBGATE_PUBLIC_APP_ORIGIN" railway variables set THUMBGATE_PUBLIC_APP_ORIGIN="$THUMBGATE_PUBLIC_APP_ORIGIN" "${SERVICE_ARGS[@]}"
          retry_railway "set THUMBGATE_BILLING_API_BASE_URL" railway variables set THUMBGATE_BILLING_API_BASE_URL="$THUMBGATE_BILLING_API_BASE_URL" "${SERVICE_ARGS[@]}"
          retry_railway "set STRIPE_SECRET_KEY" railway variables set STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" "${SERVICE_ARGS[@]}"
          retry_railway "set STRIPE_WEBHOOK_SECRET" railway variables set STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" "${SERVICE_ARGS[@]}"
          if [ -n "$THUMBGATE_FEEDBACK_DIR" ]; then
            retry_railway "set THUMBGATE_FEEDBACK_DIR" railway variables set THUMBGATE_FEEDBACK_DIR="$THUMBGATE_FEEDBACK_DIR" "${SERVICE_ARGS[@]}"
          fi
          if [ -n "$THUMBGATE_GA_MEASUREMENT_ID" ]; then
            retry_railway "set THUMBGATE_GA_MEASUREMENT_ID" railway variables set THUMBGATE_GA_MEASUREMENT_ID="$THUMBGATE_GA_MEASUREMENT_ID" "${SERVICE_ARGS[@]}"
          fi
          if [ -n "$THUMBGATE_GOOGLE_SITE_VERIFICATION" ]; then
            retry_railway "set THUMBGATE_GOOGLE_SITE_VERIFICATION" railway variables set THUMBGATE_GOOGLE_SITE_VERIFICATION="$THUMBGATE_GOOGLE_SITE_VERIFICATION" "${SERVICE_ARGS[@]}"
          fi
      - name: Deploy to Railway
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          retry_railway() {
            local description="$1"
            shift
            local attempt=1
            local max_attempts=4
            local sleep_seconds=15

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Railway command failed after $attempt attempts: $description"
                return 1
              fi

              echo "Railway command failed (attempt $attempt/$max_attempts): $description"
              echo "Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          SERVICE_ARGS=()
          if [ -n "$RAILWAY_SERVICE" ]; then
            SERVICE_ARGS+=(--service "$RAILWAY_SERVICE")
          fi
          # Use --detach to avoid "Failed to retrieve build log" streaming errors
          # (known Railway CLI issue). Health check step below verifies deployment.
          retry_railway "deploy with railway up" railway up --ci --detach --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID" "${SERVICE_ARGS[@]}"
      - name: Verify deployment health
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          # Railway promotion can lag well past five minutes after a detached upload succeeds.
          MAX_ATTEMPTS="${RAILWAY_HEALTHCHECK_MAX_ATTEMPTS:-120}"
          SLEEP_SECONDS="${RAILWAY_HEALTHCHECK_SLEEP_SECONDS:-10}"
          CONNECT_TIMEOUT_SECONDS="${RAILWAY_HEALTHCHECK_CONNECT_TIMEOUT_SECONDS:-5}"
          MAX_TIME_SECONDS="${RAILWAY_HEALTHCHECK_MAX_TIME_SECONDS:-20}"
          STATUS=""
          RESPONSE_FILE="$(mktemp)"
          LIVE_SHA=""

          echo "Waiting for deploy to stabilise with up to $MAX_ATTEMPTS health checks and build SHA verification..."
          echo "Per-attempt probe budget: connect timeout ${CONNECT_TIMEOUT_SECONDS}s, max time ${MAX_TIME_SECONDS}s."
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(curl --connect-timeout "$CONNECT_TIMEOUT_SECONDS" --max-time "$MAX_TIME_SECONDS" -sS -o "$RESPONSE_FILE" -w "%{http_code}" "$RAILWAY_HEALTHCHECK_URL" || true)
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS: $STATUS"
            if [ "$STATUS" = "200" ]; then
              LIVE_SHA=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(data.buildSha || ''));" "$RESPONSE_FILE" || true)
              echo "Observed build SHA: ${LIVE_SHA:-<missing>}"
              if [ "$LIVE_SHA" = "$GITHUB_SHA" ]; then
                break
              fi
            fi
            if [ -s "$RESPONSE_FILE" ]; then
              echo "Health response body:"
              sed -n '1,20p' "$RESPONSE_FILE"
            fi
            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              sleep "$SLEEP_SECONDS"
            fi
          done

          if [ "$STATUS" != "200" ] || [ "$LIVE_SHA" != "$GITHUB_SHA" ]; then
            echo "Deployment verification failed after $MAX_ATTEMPTS attempts"
            echo "Final health status: $STATUS"
            echo "Expected build SHA: $GITHUB_SHA"
            echo "Observed build SHA: ${LIVE_SHA:-<missing>}"
            exit 1
          fi
      - name: Capture Railway diagnostics
        if: failure() && steps.railway-config.outputs.enabled == 'true'
        continue-on-error: true
        run: bash scripts/capture-railway-diagnostics.sh railway-diagnostics
      - name: Upload Railway diagnostics artifact
        if: always() && steps.railway-config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: railway-diagnostics-${{ github.run_id }}
          path: railway-diagnostics/
          if-no-files-found: warn
