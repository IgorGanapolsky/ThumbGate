name: Weekly Social Post

# Runs the build-in-public weekly stats post every Monday at 14:00 UTC (9am ET).
# Uses Zernio as the primary publisher (X, LinkedIn, Instagram, TikTok, YouTube)
# with native X API as fallback.

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 14:00 UTC (9am ET — prime posting time)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate post file but do not publish'
        required: false
        type: boolean
        default: false
      period_days:
        description: 'Number of days to include in stats window'
        required: false
        default: '7'

permissions:
  contents: write   # needed to commit state file changes back to repo

concurrency:
  group: weekly-social-post
  cancel-in-progress: false   # never cancel an in-flight post

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Zernio — primary publisher
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
      ZERNIO_TIKTOK_ACCOUNT_ID: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
      ZERNIO_LINKEDIN_ACCOUNT_ID: ${{ secrets.ZERNIO_LINKEDIN_ACCOUNT_ID }}
      ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
      ZERNIO_PROFILE_ID: ${{ secrets.ZERNIO_PROFILE_ID }}
      # X (Twitter) — fallback publisher
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      # Dev.to — article publishing
      DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
      # Reddit
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Run weekly auto-post
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          PERIOD_DAYS="${{ github.event.inputs.period_days }}"
          PERIOD_DAYS="${PERIOD_DAYS:-7}"
          node -e "
            const { runWeeklyPost } = require('./scripts/weekly-auto-post');
            runWeeklyPost({
              periodDays: parseInt('$PERIOD_DAYS'),
              dryRun: '$DRY_RUN_FLAG' === '--dry-run',
            })
            .then(r => {
              console.log(JSON.stringify(r, null, 2));
              if (r.zernioResult && r.zernioResult.error && !r.postResult) {
                console.error('All publishers failed.');
                process.exit(1);
              }
            })
            .catch(e => { console.error(e.message); process.exit(1); });
          "

      - name: Install Python deps for video generation
        run: pip install Pillow --quiet

      - name: Generate and post marketing video (TikTok + YouTube + Instagram Reels)
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_TIKTOK_ACCOUNT_ID: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
          ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
          ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          # post-video.js: generates slides → stitches with ffmpeg → uploads → posts to all video platforms
          # Marketing DB dedup prevents double-posting within 7 days
          node scripts/social-analytics/post-video.js \
            --campaign=weekly-$(date +%Y-W%V) \
            $DRY_RUN_FLAG

      - name: _legacy_youtube_short_placeholder
        if: false
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
        run: |
          node -e "
            const https = require('https');
            const fs = require('fs');
            const path = require('path');

            const API_KEY = process.env.ZERNIO_API_KEY;
            const ACCOUNT_ID = process.env.ZERNIO_YOUTUBE_ACCOUNT_ID;
            if (!API_KEY || !ACCOUNT_ID) {
              console.log('Skipping YouTube Short: ZERNIO_API_KEY or ZERNIO_YOUTUBE_ACCOUNT_ID not set');
              process.exit(0);
            }

            const videoPath = '.artifacts/youtube-short/thumbgate-short.mp4';
            if (!fs.existsSync(videoPath)) {
              console.error('Video file not found:', videoPath);
              process.exit(1);
            }

            function zernioRequest(endpoint, body) {
              return new Promise((resolve, reject) => {
                const data = JSON.stringify(body);
                const req = https.request({
                  hostname: 'api.zernio.com',
                  path: endpoint,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + API_KEY,
                    'Content-Length': Buffer.byteLength(data),
                  },
                }, (res) => {
                  const chunks = [];
                  res.on('data', c => chunks.push(c));
                  res.on('end', () => {
                    const body = Buffer.concat(chunks).toString();
                    try { resolve(JSON.parse(body)); } catch { resolve(body); }
                  });
                });
                req.on('error', reject);
                req.write(data);
                req.end();
              });
            }

            (async () => {
              // Step 1: Upload local media
              const videoBuffer = fs.readFileSync(videoPath);
              const uploadResult = await zernioRequest('/v1/media/upload', {
                accountId: ACCOUNT_ID,
                fileName: 'thumbgate-short.mp4',
                contentType: 'video/mp4',
                data: videoBuffer.toString('base64'),
              });
              console.log('Upload result:', JSON.stringify(uploadResult));
              const mediaId = uploadResult.mediaId || (uploadResult.data && uploadResult.data.mediaId);
              if (!mediaId) { console.error('No mediaId returned'); process.exit(1); }

              // Step 2: Publish post with video to YouTube
              const publishResult = await zernioRequest('/v1/posts/publish', {
                accountId: ACCOUNT_ID,
                platform: 'youtube',
                postType: 'short',
                title: 'ThumbGate — Pre-Action Gates for AI Coding Agents #shorts',
                description: 'Stop your AI coding agent from repeating mistakes. Pre-action gates that physically block known-bad tool calls. Install: npx thumbgate init\\n\\n#AIAgent #ClaudeCode #CodingAgent #DevTools #ThumbGate',
                mediaItems: [{ mediaId: mediaId, type: 'video' }],
              });
              console.log('Publish result:', JSON.stringify(publishResult));
              if (publishResult.error) { console.error('Publish failed:', publishResult.error); process.exit(1); }
              console.log('YouTube Short published successfully');
            })().catch(e => { console.error(e.message); process.exit(1); });
          "

      - name: Commit state file changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage any state files written by the weekly post script.
          # These live under .thumbgate/ which is git-tracked state (not ignored).
          git add .thumbgate/ || true

          if git diff --cached --quiet; then
            echo "No state file changes to commit."
          else
            git commit -m "chore: update weekly-post state [skip ci]"
            git push
          fi
