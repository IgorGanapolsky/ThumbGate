name: Publish to NPM

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'server.json'
      - '.github/workflows/publish-npm.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          # npm provenance on GitHub Actions is most reliable on current LTS.
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --onnxruntime-node-install-cuda=skip
      - name: Run release safety checks
        run: |
          node scripts/sync-version.js --check
          npm run test:deployment
          npm run test:postinstall
          npm run prove:runtime
      - name: Audit npm package boundary
        run: npm pack --dry-run
      - name: Resolve package version
        id: package
        run: |
          version=$(node -e 'process.stdout.write(require("./package.json").version)')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check whether version is already on npm
        id: npm
        run: |
          if npm view "thumbgate@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Inspect release tag provenance
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: tag
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/v${VERSION}" | awk '{print $1}')"

          if [ -n "$remote_tag_sha" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "sha=$remote_tag_sha" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Plan publish action
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: plan
        env:
          VERSION: ${{ steps.package.outputs.version }}
          CURRENT_SHA: ${{ github.sha }}
          CURRENT_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: main
          NPM_PUBLISHED: ${{ steps.npm.outputs.published }}
          TAG_EXISTS: ${{ steps.tag.outputs.exists }}
          TAG_SHA: ${{ steps.tag.outputs.sha }}
        run: node scripts/publish-decision.js
      - name: Report publish no-op
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.skip_publish == 'true'
        run: echo "${{ steps.plan.outputs.reason }}"
      - name: Guard against silent no-op when main has content changes since last publish
        # Prevents the "1.5.2 already on npm, content changes don't ship" failure mode.
        # If the published version already exists but main has meaningful source changes
        # (README, HTML, scripts) since that tag, we should have bumped the version
        # unless pending valid changesets already describe the next release.
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.npm.outputs.published == 'true' && steps.plan.outputs.skip_publish == 'true'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -e
          # Find the last release tag. If main has commits touching shipped content
          # that aren't in that tag's tree, the author forgot to bump.
          LAST_TAG=$(git describe --tags --abbrev=0 --match='v*' 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "::notice::No prior release tag — cannot compare content drift."
            exit 0
          fi
          # Count changes in shipped surfaces since that tag. Include package
          # manifests because package boundary changes alter the npm tarball
          # even when runtime source files are unchanged.
          SHIPPED_CHANGES=$(git diff --name-only "$LAST_TAG"..HEAD -- \
            'package.json' 'package-lock.json' 'server.json' \
            'adapters/**' 'plugins/**' 'public/*.html' 'scripts/*.js' \
            'src/**' 'bin/**' 'README.md' 'CHANGELOG.md' 2>/dev/null | wc -l | tr -d ' ')
          VALID_PENDING_CHANGESETS=$(LAST_TAG="$LAST_TAG" node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const { collectChangesets } = require('./scripts/changeset-check');

          const diffOutput = execFileSync('git', [
            'diff',
            '--name-only',
            `${process.env.LAST_TAG}..HEAD`,
            '--',
            '.changeset/*.md',
            ':!.changeset/README.md',
          ], { encoding: 'utf8' });

          const files = diffOutput.split(/\r?\n/).filter(Boolean);
          const count = collectChangesets({ files }).filter((entry) => entry.validForPackage).length;
          process.stdout.write(String(count));
          NODE
          )
          if [ "$SHIPPED_CHANGES" -gt 0 ] && [ "$VALID_PENDING_CHANGESETS" -gt 0 ]; then
            echo "::notice::Pending valid .changeset entries cover ${SHIPPED_CHANGES} shipped file changes since ${LAST_TAG}; no-op publish is expected until the release version is consumed."
            exit 0
          fi
          if [ "$SHIPPED_CHANGES" -gt 0 ]; then
            echo "::error::Silent no-op detected: ${SHIPPED_CHANGES} shipped files changed since ${LAST_TAG} but package.json still says ${VERSION} (already on npm). Bump the version or tests won't verify the content ships."
            git diff --name-only "$LAST_TAG"..HEAD -- \
              'package.json' 'package-lock.json' 'server.json' \
              'adapters/**' 'plugins/**' 'public/*.html' 'scripts/*.js' \
              'src/**' 'bin/**' 'README.md' 'CHANGELOG.md' | head -20
            exit 1
          fi
          echo "::notice::No shipped content changes since ${LAST_TAG} — no-op is legitimate."
      - name: Create release tag
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.create_tag == 'true'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
      - name: Publish npm package
        if: ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.publish_npm == 'true') || (github.event_name == 'release' && steps.npm.outputs.published == 'false')
        run: npm publish --tag "${{ steps.plan.outputs.npm_tag || 'latest' }}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Verify published npm runtime smoke
        if: ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.publish_npm == 'true') || (github.event_name == 'release' && steps.npm.outputs.published == 'false')
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: node scripts/prove-packaged-runtime.js --package-spec "thumbgate@${VERSION}" --expected-version "${VERSION}" --install-attempts 12 --install-delay-ms 10000
      - name: Resolve npm publish receipt
        id: receipt
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.ensure_release == 'true'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const version = process.env.VERSION;
          const metadata = JSON.parse(execFileSync('npm', [
            'view',
            `thumbgate@${version}`,
            'dist',
            'time',
            '--json',
          ], { encoding: 'utf8' }));
          const dist = metadata.dist || {};
          const time = metadata.time || {};
          const lines = [
            `shasum=${dist.shasum || ''}`,
            `tarball=${dist.tarball || ''}`,
            `published_at=${time[version] || ''}`,
          ];

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${lines.join('\n')}\n`);
          NODE
      - name: Build full changeset release notes
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.ensure_release == 'true'
        env:
          VERSION: ${{ steps.package.outputs.version }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NPM_SHASUM: ${{ steps.receipt.outputs.shasum }}
          NPM_TARBALL_URL: ${{ steps.receipt.outputs.tarball }}
          NPM_PUBLISHED_AT: ${{ steps.receipt.outputs.published_at }}
        run: |
          notes_file="thumbgate-${VERSION}-release-notes.md"
          node scripts/release-notes.js \
            --version="${VERSION}" \
            --current-ref="${GITHUB_SHA}" \
            --github-run-url="${GITHUB_RUN_URL}" \
            --npm-shasum="${NPM_SHASUM}" \
            --npm-tarball-url="${NPM_TARBALL_URL}" \
            --npm-published-at="${NPM_PUBLISHED_AT}" \
            --output="${notes_file}"
          cat "${notes_file}" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload full release notes artifact
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.ensure_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: thumbgate-${{ steps.package.outputs.version }}-release-notes
          path: thumbgate-${{ steps.package.outputs.version }}-release-notes.md
          if-no-files-found: error
      - name: Ensure GitHub Release exists
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.ensure_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          notes_file="thumbgate-${VERSION}-release-notes.md"
          if ! gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release create "v${VERSION}" --title "thumbgate@${VERSION}" --notes-file "${notes_file}"
          else
            gh release edit "v${VERSION}" --title "thumbgate@${VERSION}" --notes-file "${notes_file}"
          fi
          gh release upload "v${VERSION}" "${notes_file}" --clobber
