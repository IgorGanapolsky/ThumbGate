name: Social Analytics Poll

# Polls all configured social platforms daily at 06:00 UTC to refresh engagement
# metrics stored in the local SQLite analytics database.
# Each poller is self-skipping when its required env vars are absent.

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose poller output'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: social-analytics-poll
  cancel-in-progress: true   # a newer run supersedes a stale one

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # X/Twitter analytics polling retired 2026-04-20 — the publisher was
      # quarantined and we no longer maintain an X presence to poll.
      # Reddit
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
      REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
      # Zernio (aggregates Instagram, LinkedIn, TikTok, YouTube)
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Poll all platforms
        run: node scripts/social-analytics/poll-all.js
