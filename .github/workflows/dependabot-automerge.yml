name: Dependabot Auto-Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: write

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  THUMBGATE_MAIN_MERGE_PROVIDER: trunk

jobs:
  dependabot-automerge:
    name: dependabot-automerge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted base workflow tools
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-approve update
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const alreadyApproved = reviews.some(
              (review) =>
                review.user?.login === "github-actions[bot]" &&
                review.state === "APPROVED"
            );

            if (alreadyApproved) {
              core.info("Dependabot update already approved by github-actions[bot].");
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: "APPROVE",
              body: "Auto-approved Dependabot update.",
            });

      - name: Checkout Dependabot head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}
          path: .dependabot-head

      - name: Add generated changeset for manifest-only dependency bumps
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          mapfile -t changed_files < <(gh pr diff "$PR_URL" --name-only)
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed files detected for $PR_URL"
            exit 0
          fi

          for file in "${changed_files[@]}"; do
            case "$file" in
              package.json|package-lock.json) ;;
              *)
                echo "Skipping generated changeset because $file is outside manifest-only dependency bumps."
                exit 0
                ;;
            esac
          done

          output_path=".dependabot-head/.changeset/dependabot-pr-${PR_NUMBER}.md"
          node scripts/dependabot-changeset.js --title "$PR_TITLE" --output "$output_path" >/tmp/dependabot-changeset-path.txt

          if git -C .dependabot-head diff --quiet -- "$output_path"; then
            echo "Generated changeset already matches $output_path"
            exit 0
          fi

          git -C .dependabot-head config user.name 'github-actions[bot]'
          git -C .dependabot-head config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C .dependabot-head add "$output_path"
          git -C .dependabot-head commit -m "chore: add changeset for dependabot PR #${PR_NUMBER}"
          git -C .dependabot-head push origin "HEAD:${HEAD_REF}"

      - name: Request merge automation
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          if [ "$BASE_REF" = "main" ] && [ "${THUMBGATE_MAIN_MERGE_PROVIDER}" = "trunk" ]; then
            existing_comment_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                --jq '.[] | select(.user.login == "github-actions[bot]" and .body == "/trunk merge") | .id' \
                | head -n 1
            )"

            if [ -n "${existing_comment_id:-}" ]; then
              echo "Trunk merge request already exists for $PR_URL"
            else
              gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                --method POST \
                -f body='/trunk merge' >/dev/null
              echo "Requested Trunk merge for $PR_URL"
            fi

            {
              echo "### Merge automation"
              echo "- Provider: trunk"
              echo "- PR: $PR_URL"
              echo "- Queue request: \`/trunk merge\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          gh pr merge --squash --delete-branch "$PR_URL"

          {
            echo "### Merge automation"
            echo "- Provider: github"
            echo "- PR: $PR_URL"
            echo "- Mode: direct squash after terminal checks"
          } >> "$GITHUB_STEP_SUMMARY"
