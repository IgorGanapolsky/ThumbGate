name: Video Autopilot

# Fires every 4 hours. Generates a marketing slide video and posts to
# TikTok, YouTube Shorts, and Instagram Reels via Zernio.
#
# Content rotation: 6 templates picked by least-recently-used order in
# the marketing DB — never double-posts the same template within 7 days.
#
# Per-platform cooldowns (enforced by marketing DB):
#   TikTok:    4 h  (up to 6 videos/day)
#   Instagram: 8 h  (up to 3 Reels/day)
#   YouTube:  12 h  (up to 2 Shorts/day)
#
# The CI run is a no-op (skips all platforms) if cooldowns haven't expired.

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours, all days
  workflow_dispatch:
    inputs:
      template:
        description: 'Slide template (1-6, or auto)'
        required: false
        default: 'auto'
      platforms:
        description: 'Comma-separated platforms (tiktok,youtube,instagram)'
        required: false
        default: 'tiktok,youtube,instagram'
      dry_run:
        description: 'Dry run — generate video but do not post'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: video-autopilot
  cancel-in-progress: false   # never cancel — let the in-flight post finish

jobs:
  post-video:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ZERNIO_API_KEY:             ${{ secrets.ZERNIO_API_KEY }}
      ZERNIO_TIKTOK_ACCOUNT_ID:   ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
      ZERNIO_YOUTUBE_ACCOUNT_ID:  ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
      ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
      THUMBGATE_ANALYTICS_DB: .thumbgate/marketing-analytics.sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Restore marketing DB cache
        uses: actions/cache@v4
        with:
          path: |
            .thumbgate/marketing-analytics.sqlite
            .thumbgate/marketing-analytics.sqlite-shm
            .thumbgate/marketing-analytics.sqlite-wal
          # v2 cache key — bumped 2026-04-15 to clear stuck Instagram
          # dedup/cooldown state. After the presign fix (#879) the DB may
          # still contain 'published' rows whose Instagram delivery actually
          # failed downstream, causing every subsequent run to skip via
          # 8h cooldown. Starting from a fresh DB lets us see real behaviour.
          key: marketing-db-v2-${{ github.run_id }}
          restore-keys: |
            marketing-db-v2-

      - name: Diagnostic — Zernio + marketing DB pre-flight
        env:
          GH_ZERNIO_API_KEY_LEN: ${{ secrets.ZERNIO_API_KEY && 'set' || 'MISSING' }}
          GH_ZERNIO_IG_ACCT: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID && 'set' || 'MISSING' }}
          GH_ZERNIO_TT_ACCT: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID && 'set' || 'MISSING' }}
          GH_ZERNIO_YT_ACCT: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID && 'set' || 'MISSING' }}
        run: |
          echo "=== SECRET PRESENCE ==="
          echo "ZERNIO_API_KEY: $GH_ZERNIO_API_KEY_LEN"
          echo "ZERNIO_INSTAGRAM_ACCOUNT_ID: $GH_ZERNIO_IG_ACCT"
          echo "ZERNIO_TIKTOK_ACCOUNT_ID: $GH_ZERNIO_TT_ACCT"
          echo "ZERNIO_YOUTUBE_ACCOUNT_ID: $GH_ZERNIO_YT_ACCT"
          echo ""
          echo "=== MARKETING DB SUMMARY (pre-run) ==="
          node -e "try { const db=require('./scripts/social-analytics/db/marketing-db'); console.log(JSON.stringify(db.summary(), null, 2)); } catch(e){ console.log('(empty or unreadable:', e.message, ')'); }" || true
          echo ""
          echo "=== ZERNIO CONNECTED ACCOUNTS ==="
          node -e "
            (async () => {
              try {
                const { getConnectedAccounts } = require('./scripts/social-analytics/publishers/zernio');
                const accts = await getConnectedAccounts();
                console.log(JSON.stringify(accts.map(a => ({platform: a.platform, accountId: a.accountId, name: a.name, username: a.username})), null, 2));
              } catch(e) {
                console.log('getConnectedAccounts failed:', e.message);
              }
            })();
          " || true
          echo ""
          echo "=== RECENT MARKETING_POSTS (pre-run) ==="
          node -e "
            try {
              const { getDb } = require('./scripts/social-analytics/db/marketing-db');
              const rows = getDb().prepare(\"SELECT platform, type, status, published_at, post_url, campaign FROM marketing_posts ORDER BY published_at DESC LIMIT 20\").all();
              console.log(JSON.stringify(rows, null, 2));
            } catch(e) { console.log('read failed:', e.message); }
          " || true

      - name: Install Python + Pillow (slide renderer)
        run: pip install Pillow --quiet

      - name: Install ffmpeg (video stitcher)
        run: sudo apt-get install -y ffmpeg --quiet

      - name: Generate slides + render + post to all video platforms
        env:
          INPUT_TEMPLATE: ${{ github.event.inputs.template || 'auto' }}
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms || 'tiktok,youtube,instagram' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          TEMPLATE="$INPUT_TEMPLATE"
          PLATFORMS="$INPUT_PLATFORMS"
          DRY_RUN_FLAG=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          WEEK=$(date +%Y-W%V)
          node scripts/social-analytics/post-video.js \
            --template="$TEMPLATE" \
            --platforms="$PLATFORMS" \
            --campaign="autopilot-$WEEK" \
            $DRY_RUN_FLAG

      - name: Print marketing DB summary
        if: always()
        run: |
          node -e "const db=require('./scripts/social-analytics/db/marketing-db'); console.log(JSON.stringify(db.summary(), null, 2));" || true
