name: Rotate Stripe Webhook Secret

on:
  workflow_dispatch:
    inputs:
      endpoint_url:
        description: 'Stripe webhook endpoint URL to rotate'
        required: false
        default: 'https://thumbgate-production.up.railway.app/v1/billing/webhook'
      dry_run:
        description: 'Plan only; do not create endpoint or update GitHub secrets'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      THUMBGATE_MAINTENANCE_GH_TOKEN: ${{ secrets.THUMBGATE_MAINTENANCE_GH_TOKEN }}
      STRIPE_WEBHOOK_ENDPOINT_URL: ${{ inputs.endpoint_url }}
      DRY_RUN: ${{ inputs.dry_run }}
      REQUIRE_LIVE_STRIPE_KEY: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rotate Stripe webhook signing secret
        run: node scripts/rotate-stripe-webhook-secret.js
