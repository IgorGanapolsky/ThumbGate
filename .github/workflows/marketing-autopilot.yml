name: Marketing Autopilot

# Text content autopilot — fires every 4 hours.
# Posts text/image content to LinkedIn, Threads, Bluesky, and Instagram.
# YouTube remains video-only via the video autopilot.
# Posts to Reddit via the configured OAuth publisher.
# Posts Dev.to articles on a separate slower cadence.
# Marketing DB dedup prevents double-posting within configured windows.
# X/Twitter was deprecated as a posting channel on 2026-04-20; the
# X_* secrets and scripts/post-to-x*.* helpers have been retired.

on:
  schedule:
    - cron: '15 */4 * * *'   # every 4 hours, offset from video-autopilot
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        type: choice
        default: full
        options:
          - full
          - text-posts
          - reddit
          - devto
          - generate-content
      dry_run:
        description: 'Dry run (generate but do not post)'
        required: false
        type: boolean
        default: false
      platforms:
        description: 'Comma-separated text-capable platforms (default: linkedin,threads,bluesky,instagram)'
        required: false
        default: 'linkedin,threads,bluesky,instagram'

permissions:
  contents: write

concurrency:
  group: marketing-autopilot
  cancel-in-progress: false

jobs:
  marketing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Zernio — primary social publisher
      ZERNIO_API_KEY:               ${{ secrets.ZERNIO_API_KEY }}
      ZERNIO_PROFILE_ID:            ${{ secrets.ZERNIO_PROFILE_ID }}
      ZERNIO_LINKEDIN_ACCOUNT_ID:   ${{ secrets.ZERNIO_LINKEDIN_ACCOUNT_ID }}
      ZERNIO_INSTAGRAM_ACCOUNT_ID:  ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
      ZERNIO_TIKTOK_ACCOUNT_ID:     ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
      ZERNIO_YOUTUBE_ACCOUNT_ID:    ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
      ZERNIO_REDDIT_ACCOUNT_ID:     ${{ secrets.ZERNIO_REDDIT_ACCOUNT_ID }}
      # Reddit — configured OAuth publisher
      REDDIT_CLIENT_ID:             ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET:         ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USERNAME:              ${{ secrets.REDDIT_USERNAME }}
      REDDIT_PASSWORD:              ${{ secrets.REDDIT_PASSWORD }}
      # LinkedIn — direct API fallback
      LINKEDIN_ACCESS_TOKEN:        ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_PERSON_URN:          ${{ secrets.LINKEDIN_PERSON_URN }}
      # Dev.to
      DEVTO_API_KEY:                ${{ secrets.DEVTO_API_KEY }}
      THUMBGATE_ANALYTICS_DB:       .thumbgate/marketing-analytics.sqlite
      # Content generation
      PERPLEXITY_API_KEY:           ${{ secrets.PERPLEXITY_API_KEY }}
      XAI_API_KEY:                  ${{ secrets.XAI_API_KEY }}
      GROK_API_KEY:                 ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY:               ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_GENERATIVE_AI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Restore marketing DB cache
        uses: actions/cache@v5
        with:
          path: |
            .thumbgate/marketing-analytics.sqlite
            .thumbgate/marketing-analytics.sqlite-shm
            .thumbgate/marketing-analytics.sqlite-wal
          key: marketing-db-${{ github.run_id }}
          restore-keys: |
            marketing-db-

      - name: Generate fresh content (AI-powered)
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.action == 'generate-content' ||
          github.event.inputs.action == 'full'
        run: |
          if [ -n "$PERPLEXITY_API_KEY" ]; then
            node scripts/perplexity-marketing.js generate || echo "::warning::Content generation failed — using scheduled fallback"
          else
            echo "PERPLEXITY_API_KEY not set — skipping AI content generation"
          fi

      - name: Post text content via Zernio (LinkedIn, Threads, Bluesky, Instagram)
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.action == 'text-posts' ||
          github.event.inputs.action == 'full'
        env:
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms || 'linkedin,threads,bluesky,instagram' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          PLATFORMS="$INPUT_PLATFORMS"
          DRY_RUN_FLAG=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then DRY_RUN_FLAG="--dry-run"; fi
          WEEK=$(date +%Y-W%V)
          HOUR=$(date +%H)
          mkdir -p scripts/marketing-output
          POST_FILE="scripts/marketing-output/autopilot-paid-sprint-$WEEK-h$HOUR.md"
          cat > "$POST_FILE" <<'POST'
          # LinkedIn Post: paid workflow hardening sprint
          **Title:** Opening two workflow hardening sprint slots
          **Body:**
          I am opening two paid Workflow Hardening Sprint slots for teams running coding agents in production repos.

          The scope is intentionally narrow: one repeated failure, one prevention rule, one proof run, and a rollout note your team can inspect.

          Use the $499 diagnostic if you want the failure mapped first, or the $1500 sprint if the workflow is already known.

          Diagnostic: https://buy.stripe.com/00w14neyUcXA5pL5e33sI0e
          Sprint: https://buy.stripe.com/fZu9AT76saPsg4pbCr3sI0f
          Scope: https://thumbgate.ai/#workflow-sprint-intake
          POST
          node scripts/post-everywhere.js \
            "$POST_FILE" \
            --platforms="$PLATFORMS" \
            --campaign="autopilot-text-$WEEK-h$HOUR" \
            $DRY_RUN_FLAG \
          || echo "::warning::post-everywhere failed — X fallback removed 2026-04-20, no secondary publisher configured"

      - name: Post to Reddit via configured OAuth publisher
        if: |
          (github.event_name == 'schedule' ||
           github.event.inputs.action == 'reddit' ||
           github.event.inputs.action == 'full') &&
          env.REDDIT_USERNAME != '' &&
          env.REDDIT_CLIENT_ID != ''
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then DRY_RUN_FLAG="--dry-run"; fi
          # Reddit posts use the configured publisher credentials.
          # Targets subreddits: r/ClaudeAI (link), r/LocalLLaMA (link), r/SideProject (text)
          node -e "
            const { loadLocalEnv } = require('./scripts/social-analytics/load-env');
            loadLocalEnv();
            const db = require('./scripts/social-analytics/db/marketing-db');
            const reddit = require('./scripts/social-analytics/publishers/reddit');

            const PRO_URL = 'https://thumbgate-production.up.railway.app/pro?utm_source=reddit&utm_medium=social&utm_campaign=autopilot';
            const BUY_URL = 'https://thumbgate-production.up.railway.app/go/pro?utm_source=reddit&utm_campaign=autopilot';
            const POSTS = [
              {
                subreddit: 'ClaudeAI',
                kind: 'link',
                title: 'ThumbGate v1.4.1: Pre-action safety checks that block Claude Code from repeating mistakes',
                url: 'https://thumbgate-production.up.railway.app/pro?utm_source=reddit&utm_medium=social&utm_campaign=autopilot&utm_content=claudeai',
              },
              {
                subreddit: 'SideProject',
                kind: 'self',
                title: 'I built pre-action checks that physically block Claude Code from repeating mistakes — now with a Pro tier',
                text: [
                  'After my AI agent force-pushed to main and wiped 3 PRs, I built ThumbGate.',
                  '',
                  'It intercepts every tool call via PreToolUse hooks and checks it against lessons learned from past failures. 1 bad action = warning gate. 3 bad actions = hard block.',
                  '',
                  'v1.4.1 ships with Thompson Sampling for gate ranking and LanceDB for semantic lesson retrieval.',
                  '',
                  '**Free tier:** up to 5 gates, SQLite lesson DB, npx thumbgate serve',
                  '**Pro ($19/mo):** unlimited gates, LanceDB vectors, DPO export, team sync, dashboard',
                  '',
                  '💳 Get Pro ($19/mo): ' + BUY_URL,
                  'Pricing page: ' + PRO_URL,
                  'Free + open source: https://github.com/IgorGanapolsky/ThumbGate',
                  'npx thumbgate serve',
                ].join('\\n'),
              },
              {
                subreddit: 'LocalLLaMA',
                kind: 'self',
                title: 'ThumbGate: pre-action checks that stop AI agents from repeating the same mistakes',
                text: [
                  'Built a tool that intercepts every tool call before it executes and checks it against a lesson DB built from past failures.',
                  '',
                  'Works with Claude Code, Cursor, Codex CLI via MCP. Every thumbs-down on a bad action becomes a prevention rule automatically.',
                  '',
                  '- 1 bad action → warn gate',
                  '- 3 bad actions → hard block',
                  '- Thompson Sampling ranks gates by failure frequency',
                  '- LanceDB for semantic lesson retrieval (Pro)',
                  '',
                  'Free: https://github.com/IgorGanapolsky/ThumbGate',
                  '💳 Pro ($19/mo): ' + BUY_URL,
                ].join('\\n'),
              },
            ];

            const dryRun = process.argv.includes('--dry-run');

            (async () => {
              for (const p of POSTS) {
                const hash = db.hashContent(p.title + '::' + p.subreddit);
                if (db.isDuplicate('reddit', hash, 7)) {
                  console.log('SKIP reddit/' + p.subreddit + ' — posted within 7 days');
                  continue;
                }
                if (dryRun) { console.log('DRY-RUN reddit/' + p.subreddit); continue; }
                try {
                  const r = await reddit.publishToReddit(p);
                  console.log('Posted reddit/' + p.subreddit + ':', r.url || r.name);
                  db.record({ type: 'post', platform: 'reddit', contentHash: hash,
                    postUrl: r.url, campaign: 'autopilot', tags: ['reddit', p.subreddit] });
                } catch(e) {
                  console.error('reddit/' + p.subreddit + ' failed:', e.message);
                }
              }
            })();
          " $DRY_RUN_FLAG || echo "::warning::Reddit posting failed"

      - name: Publish Dev.to article (weekly cadence)
        if: |
          (github.event_name == 'schedule' ||
           github.event.inputs.action == 'devto' ||
           github.event.inputs.action == 'full') &&
          env.DEVTO_API_KEY != ''
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          DRY_RUN_FLAG="$INPUT_DRY_RUN"
          node -e "
            const { loadLocalEnv } = require('./scripts/social-analytics/load-env');
            loadLocalEnv();
            const db = require('./scripts/social-analytics/db/marketing-db');
            const devto = require('./scripts/social-analytics/publishers/devto');

            const ARTICLE = {
              title: 'Opening 2 Workflow Hardening Sprint Slots for AI Coding Agents',
              body_markdown: [
                '## The short version',
                '',
                'I am opening two paid ThumbGate Workflow Hardening Sprint slots for teams using Claude Code, Cursor, Codex, Gemini, or MCP-backed coding agents in production repos.',
                '',
                'This is not a generic AI audit. It is one workflow, one repeated failure, one prevention rule, and one proof run.',
                '',
                '## Best fit',
                '',
                '- The agent keeps repeating the same repo mistake across sessions',
                '- Review or approval boundaries are getting skipped',
                '- Context drift causes unsafe file edits, deploy steps, or tool calls',
                '- You need proof that the same failure is blocked before rollout',
                '',
                '## Offer',
                '',
                '- $499 diagnostic: I map one risky workflow, identify the repeat failure pattern, and return a prevention-rule plan plus first-fix checklist.',
                '- $1500 implementation sprint: I implement the first guardrails and prove the repeated failure is blocked.',
                '',
                '## Why ThumbGate',
                '',
                'ThumbGate turns explicit feedback into pre-action checks. Instead of hoping a future prompt remembers the rule, the risky action is checked before the next tool call lands.',
                '',
                'That matters when agents touch real repos, customer systems, data workflows, deployment scripts, or approval boundaries.',
                '',
                '## Start here',
                '',
                'Diagnostic checkout: https://buy.stripe.com/00w14neyUcXA5pL5e33sI0e',
                '',
                'Sprint checkout: https://buy.stripe.com/fZu9AT76saPsg4pbCr3sI0f',
                '',
                'Scope and intake: https://thumbgate.ai/?utm_source=devto&utm_medium=article&utm_campaign=workflow_hardening_slots_20260505#workflow-sprint-intake',
                '',
                'If the self-serve path is enough, start with the guide: https://thumbgate.ai/guide?utm_source=devto&utm_medium=article&utm_campaign=workflow_hardening_slots_20260505',
                '',
                '## Proof links',
                '',
                '- Commercial truth: https://github.com/IgorGanapolsky/ThumbGate/blob/main/docs/COMMERCIAL_TRUTH.md',
                '- Verification evidence: https://github.com/IgorGanapolsky/ThumbGate/blob/main/docs/VERIFICATION_EVIDENCE.md',
              ].join('\\n'),
              tags: ['claudecode', 'ai', 'devtools', 'productivity'],
            };

            const hash = db.hashContent(ARTICLE.title);
            if (db.isDuplicate('devto', hash, 7)) {
              console.log('SKIP devto — article posted within 7 days');
              process.exit(0);
            }

            if (process.env.INPUT_DRY_RUN === 'true') {
              console.log('DRY-RUN devto — would post:', ARTICLE.title);
              process.exit(0);
            }

            devto.publishArticle(ARTICLE)
              .then(r => {
                console.log('devto published:', r.url);
                db.record({ type: 'article', platform: 'devto', contentHash: hash,
                  postUrl: r.url, campaign: 'autopilot', tags: ['devto', 'v1.4.1'] });
              })
              .catch(e => {
                console.error('devto failed:', e.message);
                process.exit(1);
              });
          " || echo "::warning::Dev.to posting failed"

      - name: Print marketing DB summary
        if: always()
        run: |
          node -e "const db=require('./scripts/social-analytics/db/marketing-db'); console.log(JSON.stringify(db.summary(), null, 2));" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: marketing-autopilot-${{ github.run_id }}
          retention-days: 7
          path: |
            scripts/marketing-output/
            proof/marketing/
