name: Social Engagement (Smart Schedule)

# Strategy based on research of Linear, Vercel, Supabase, PostHog, Cursor, Raycast, Cal.com:
# - 1 quality post/day (not 24 spam posts)
# - Reply monitoring and analytics polling are owned by Ralph Loop Audience Engagement
# - Content rotates: horror stories, hot takes, tips, product demos
# - No Dev.to auto-posting (counterproductive at high volume)
# - Reddit: reply-only, no auto-posting (ban risk)

on:
  schedule:
    # Post once daily at 2pm UTC (10am EST — peak dev engagement)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        type: choice
        options:
          - all
          - post
          - reply
          - poll
      dry_run:
        description: 'Dry run (no actual posts/replies)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: social-engagement
  cancel-in-progress: true

jobs:
  post-via-zernio:
    # Only post at 2pm UTC, not on reply-monitor runs
    if: >-
      github.event.schedule == '0 14 * * *' ||
      github.event.inputs.action == 'all' ||
      github.event.inputs.action == 'post'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
      ZERNIO_LINKEDIN_ACCOUNT_ID: ${{ secrets.ZERNIO_LINKEDIN_ACCOUNT_ID }}
      ZERNIO_PROFILE_ID: ${{ secrets.ZERNIO_PROFILE_ID }}
      ZERNIO_REDDIT_ACCOUNT_ID: ${{ secrets.ZERNIO_REDDIT_ACCOUNT_ID }}
      ZERNIO_TIKTOK_ACCOUNT_ID: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
      ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Generate and post via Zernio
        run: |
          DRY_RUN=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run"
          fi
          node scripts/social-post-hourly.js $DRY_RUN

  reply-to-comments:
    # Manual fallback only. Scheduled reply engagement is owned by Ralph Loop.
    if: >-
      github.event.inputs.action == 'all' ||
      github.event.inputs.action == 'reply'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
      ZERNIO_LINKEDIN_ACCOUNT_ID: ${{ secrets.ZERNIO_LINKEDIN_ACCOUNT_ID }}
      ZERNIO_PROFILE_ID: ${{ secrets.ZERNIO_PROFILE_ID }}
      ZERNIO_REDDIT_ACCOUNT_ID: ${{ secrets.ZERNIO_REDDIT_ACCOUNT_ID }}
      ZERNIO_TIKTOK_ACCOUNT_ID: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
      ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
      REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
      THUMBGATE_REDDIT_TRACKED_THREADS: https://www.reddit.com/r/ClaudeCode/comments/1szi5qp/
      # X/Twitter reply secrets retired 2026-04-20. Reddit/LinkedIn use
      # scripts/social-reply-monitor.js; Bluesky uses direct AT Protocol.
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Monitor and reply to comments
        run: |
          DRY_RUN=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run"
          fi
          node scripts/social-reply-monitor.js $DRY_RUN
          if [ -n "$BLUESKY_HANDLE" ] && [ -n "$BLUESKY_APP_PASSWORD" ]; then
            node scripts/social-reply-monitor-bluesky.js $DRY_RUN
          else
            echo "Skipping Bluesky reply monitor: BLUESKY_HANDLE or BLUESKY_APP_PASSWORD is missing."
          fi

  poll-analytics:
    # Manual fallback only. Scheduled analytics polling is owned by Ralph Loop.
    if: >-
      github.event.inputs.action == 'all' ||
      github.event.inputs.action == 'poll'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
      ZERNIO_LINKEDIN_ACCOUNT_ID: ${{ secrets.ZERNIO_LINKEDIN_ACCOUNT_ID }}
      ZERNIO_PROFILE_ID: ${{ secrets.ZERNIO_PROFILE_ID }}
      ZERNIO_REDDIT_ACCOUNT_ID: ${{ secrets.ZERNIO_REDDIT_ACCOUNT_ID }}
      ZERNIO_TIKTOK_ACCOUNT_ID: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
      ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip
      - name: Poll all platform analytics
        run: node scripts/social-analytics/poll-all.js
