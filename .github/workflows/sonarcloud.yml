name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sonar:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Generate coverage for SonarCloud
        run: npm run test:coverage

      - name: Disable SonarCloud automatic analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          project_key="$(awk -F= '/^sonar.projectKey=/{print $2}' sonar-project.properties)"
          if [ -z "$project_key" ]; then
            echo "sonar.projectKey missing from sonar-project.properties" >&2
            exit 1
          fi

          curl \
            --silent \
            --show-error \
            --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            --request POST \
            --user "${SONAR_TOKEN}:" \
            --header 'Content-Type: application/x-www-form-urlencoded' \
            --data "enable=false&projectKey=${project_key}" \
            https://sonarcloud.io/api/autoscan/activation

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
