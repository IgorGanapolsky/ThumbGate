name: LinkedIn Post Dispatch

# Publishes a first-party LinkedIn post (text-only or with a link-preview
# article) as the authenticated member. This is the fallback when the
# Community Management Comment API (requires sole-product approval) and the
# Quote-Post reshare flow (requires write-access to another member's
# share/ugcPost) are both blocked by LinkedIn's permission model.
#
# Required secrets:
#   LINKEDIN_ACCESS_TOKEN  — w_member_social scope
#   LINKEDIN_PERSON_URN    — urn:li:person:XXXX (author)

on:
  workflow_dispatch:
    inputs:
      commentary:
        description: 'Post body (≤3000 chars, plain text, newlines ok)'
        required: true
        type: string
      article_url:
        description: 'Optional: URL to attach as a link-preview card (e.g. the post being referenced)'
        required: false
        type: string
        default: ''
      article_title:
        description: 'Optional: Title text for the link-preview card'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: linkedin-post-dispatch
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      THUMBGATE_ANALYTICS_DB: .thumbgate/marketing-analytics.sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Publish post via Zernio
        env:
          COMMENTARY: ${{ github.event.inputs.commentary }}
        run: |
          node - <<'NODE'
          const { publishToAllPlatforms } = require('./scripts/social-analytics/publishers/zernio');

          const text = process.env.COMMENTARY || '';
          if (!text.trim()) {
            throw new Error('commentary is required');
          }

          publishToAllPlatforms(text, {
            campaign: 'voice_agent_reliability_diagnostic',
            medium: 'social',
            platforms: ['linkedin', 'threads', 'instagram'],
          })
            .then((result) => {
              console.log(JSON.stringify(result, null, 2));
              if (result.errors && result.errors.length > 0) {
                process.exit(1);
              }
            })
            .catch((error) => {
              console.error(error.message);
              process.exit(1);
            });
          NODE
