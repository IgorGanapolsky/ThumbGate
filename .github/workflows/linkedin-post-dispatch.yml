name: LinkedIn Post Dispatch

# Publishes a first-party LinkedIn post (text-only or with a link-preview
# article) as the authenticated member. This is the fallback when the
# Community Management Comment API (requires sole-product approval) and the
# Quote-Post reshare flow (requires write-access to another member's
# share/ugcPost) are both blocked by LinkedIn's permission model.
#
# Required secrets:
#   LINKEDIN_ACCESS_TOKEN  — w_member_social scope
#   LINKEDIN_PERSON_URN    — urn:li:person:XXXX (author)

on:
  workflow_dispatch:
    inputs:
      commentary:
        description: 'Post body (≤3000 chars, plain text, newlines ok)'
        required: true
        type: string
      article_url:
        description: 'Optional: URL to attach as a link-preview card (e.g. the post being referenced)'
        required: false
        type: string
        default: ''
      article_title:
        description: 'Optional: Title text for the link-preview card'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: linkedin-post-dispatch
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
      REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
      THUMBGATE_ANALYTICS_DB: .thumbgate/marketing-analytics.sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Publish post via Zernio
        env:
          COMMENTARY: ${{ github.event.inputs.commentary }}
        run: |
          node - <<'NODE'
          const reddit = require('./scripts/social-analytics/publishers/reddit');

          const text = `I am opening one same-day diagnostic slot for an AI voice-agent or automation team.

          Best fit: home services, local lead-gen, or appointment-booking bots where missed calls, after-hours intake, qualification branches, booking handoffs, CRM sync, or proof gaps can quietly lose leads.

          What I will deliver for $499:
          - 20 failure-case checks
          - missed-call and after-hours intake review
          - qualification and handoff failure map
          - CRM sync / booking proof review
          - prioritized fix list your team can use immediately

          Checkout: https://buy.stripe.com/00w14neyUcXA5pL5e33sI0e
          Intake: https://thumbgate.ai/#workflow-sprint-intake

          Disclosure: I built ThumbGate and I am selling this diagnostic.`;

          reddit.publishToReddit({
            subreddit: 'SideProject',
            title: 'Offering one $499 AI voice-agent reliability diagnostic today',
            text,
          })
            .then((result) => {
              console.log(JSON.stringify(result, null, 2));
              if (result.blocked) {
                process.exit(1);
              }
            })
            .catch((error) => {
              console.error(error.message);
              process.exit(1);
            });
          NODE
