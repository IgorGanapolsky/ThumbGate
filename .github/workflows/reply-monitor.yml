name: Social Reply Monitor

# Monitors Reddit, LinkedIn, and Bluesky for replies to ThumbGate posts and generates
# contextual responses. X/Twitter monitoring was deprecated 2026-04-20 — the
# platform is no longer part of our distribution strategy. Scheduled audience
# engagement now lives in Ralph Loop Audience Engagement, which restores
# cache-backed state between CI runs. Keep this workflow as an explicit manual
# fallback only.
#
# Reddit and Bluesky replies are NEVER auto-posted by this workflow — they are saved to
# .thumbgate/reply-drafts.jsonl for human review (per script policy).

on:
  # No schedule here by design. Scheduled reply monitoring runs inside
  # Ralph Loop Audience Engagement (`ralph-loop.yml`, cron '17 * * * *'),
  # which owns cached state between runs. This workflow is a manual
  # fallback for ad-hoc dry-runs or platform-limited checks.
  # See tests/ralph-loop.test.js:186 — the contract is enforced.
  workflow_dispatch:
    inputs:
      platform:
        description: 'Limit to a single platform (leave blank for all)'
        required: false
        type: choice
        options:
          - ''
          - reddit
          - linkedin
          - bluesky
      dry_run:
        description: 'Dry run — detect replies but do not post responses'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: reply-monitor
  cancel-in-progress: true   # a newer run supersedes a stale one

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # X/Twitter reply monitoring was retired 2026-04-20. The publisher was
      # quarantined; keeping this workflow limited to Reddit + LinkedIn only.
      # Reddit — for inbox monitoring (replies are draft-only, never auto-posted)
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
      REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
      # Optional comma/newline-separated Reddit post/comment URLs to monitor
      # beyond inbox replies. Replies remain draft-only.
      THUMBGATE_REDDIT_TRACKED_THREADS: https://www.reddit.com/r/ClaudeCode/comments/1szi5qp/
      # LinkedIn — gated on Community Management API approval (see
      # docs/marketing/linkedin-api-application.md). The stub logs a warning
      # until the approved token is available; envs are wired so the moment
      # approval lands, no workflow edit is needed.
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
      # Bluesky — AT Protocol direct monitor. Drafts only unless an approved
      # draft is later published through an explicit confirmed operator action.
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Monitor and reply
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.platform }}" ]; then
            ARGS="$ARGS --platform=${{ github.event.inputs.platform }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.platform }}" = "bluesky" ]; then
            node scripts/social-reply-monitor-bluesky.js $ARGS
          else
            node scripts/social-reply-monitor.js $ARGS
            if [ -z "${{ github.event.inputs.platform }}" ]; then
              if [ -n "$BLUESKY_HANDLE" ] && [ -n "$BLUESKY_APP_PASSWORD" ]; then
                node scripts/social-reply-monitor-bluesky.js $ARGS
              else
                echo "Skipping Bluesky monitor: BLUESKY_HANDLE or BLUESKY_APP_PASSWORD is missing."
              fi
            fi
          fi

      - name: Upload reply drafts artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reply-drafts-${{ github.run_id }}
          path: .thumbgate/reply-drafts.jsonl
          if-no-files-found: ignore
          retention-days: 7
