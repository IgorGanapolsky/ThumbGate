name: Always-On GTM Acquisition Loop

on:
  schedule:
    - cron: '0 9 * * *' # Daily at 9am UTC (was hourly — saves ~23 runs/day)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acquisition:
    runs-on: ubuntu-latest
    env:
      GTM_ARTIFACT_DIR: .artifacts/gtm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --onnxruntime-node-install-cuda=skip
      - name: Prepare artifact directory
        run: mkdir -p "$GTM_ARTIFACT_DIR"
      - name: Run Prospecting & Personalization Agent
        run: node scripts/autonomous-sales-agent.js --report-dir "$GTM_ARTIFACT_DIR" --max-targets 8
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # X/Twitter premium marketing loop + launch-thread publishing were
      # retired 2026-04-20 — channel focus is now Reddit, LinkedIn, Threads,
      # Bluesky, Instagram, YouTube. The scripts (x-autonomous-marketing.js,
      # post-to-x.js) have been quarantined under scripts/_retired/.
      - name: Upload GTM artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gtm-revenue-loop
          path: .artifacts/gtm/
