name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    # Keep enough headroom for the full suite plus proof lanes on main.
    timeout-minutes: 60
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
      STRIPE_PRODUCT_ID: ${{ secrets.STRIPE_PRODUCT_ID }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      THUMBGATE_API_KEY: ${{ secrets.THUMBGATE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            workers/package-lock.json

      - name: Install deps
        run: npm ci --onnxruntime-node-install-cuda=skip

      - name: Check version sync
        run: node scripts/sync-version.js --check

      - name: Check changeset coverage for release-relevant PRs
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: npm run changeset:check

      - name: Run budget status gate
        run: npm run budget:status
      - name: Check operational integrity
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run ops:integrity:ci
      - name: Check branch protection congruence
        if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: npm run branch-protection:check
      - name: Run tests
        run: npm test

      - name: Run gate-eval regression suite
        # Exits non-zero if any case in config/evals/*.json fails against
        # config/specs/*.json. Any constraint regex change that flips a
        # previously-blocking case to pass (or vice versa) blocks merge
        # until the eval case is consciously updated in the same PR.
        run: npm run gate-eval:ci

      - name: Run coverage
        run: npm run test:coverage

      - name: Check congruence (branding, tech stack, version across all surfaces)
        run: npm run test:congruence

      - name: Run adapter proof
        run: npm run prove:adapters

      - name: Run automation proof
        run: npm run prove:automation

      - name: Run runtime proof
        run: npm run prove:runtime

      - name: Run evolution proof
        run: npm run prove:evolution

      - name: Run workflow contract proof
        run: npm run prove:workflow-contract

      - name: Run autoresearch proof
        run: npm run prove:autoresearch

      - name: Run Tessl distribution proof
        run: npm run prove:tessl

      - name: Write prompt evaluation report
        if: always()
        run: |
          mkdir -p proof
          node scripts/prompt-eval.js --min-score=0 --synthetic --synthetic-variants=1 --suite-output proof/prompt-eval-suite.generated.json --output proof/prompt-eval-report.json --json > /dev/null
          node -e "const fs=require('node:fs'); const report=JSON.parse(fs.readFileSync('proof/prompt-eval-report.json','utf8')); const lines=['## Prompt Evaluation', '- Score: ' + report.score + '%', '- Passed: ' + report.passed + '/' + report.total, '- Failed: ' + report.failed, '- Errors: ' + report.errors, '- Skipped: ' + report.skipped, '- Synthetic cases: ' + (report.syntheticCount || 0)]; if (report.comparison) lines.push('- Regressions: ' + report.comparison.regressions.length); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');"

      - name: Sync GitHub About metadata on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          THUMBGATE_GITHUB_ABOUT_VERIFY_ATTEMPTS: 6
          THUMBGATE_GITHUB_ABOUT_VERIFY_DELAY_MS: 5000
        run: npm run github:about:sync

      - name: Verify live GitHub About congruence on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          THUMBGATE_GITHUB_ABOUT_VERIFY_ATTEMPTS: 6
          THUMBGATE_GITHUB_ABOUT_VERIFY_DELAY_MS: 5000
        run: npm run test:congruence:live

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: proof-artifacts
          path: |
            proof/compatibility/report.json
            proof/compatibility/report.md
            proof/automation/report.json
            proof/automation/report.md
            proof/runtime-report.json
            proof/runtime-report.md
            proof/evolution-report.json
            proof/evolution-report.md
            proof/workflow-contract/report.json
            proof/workflow-contract/report.md
            proof/autoresearch-report.json
            proof/autoresearch-report.md
            proof/tessl-report.json
            proof/tessl-report.md
            proof/prompt-eval-report.json
            proof/prompt-eval-suite.generated.json
